<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 10px;
      overflow-y: auto;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item {
      display: flex;
      align-items: center;
      padding: 6px;
      border-radius: 6px;
      cursor: pointer;
      gap: 8px;
      transition: background 0.15s;
    }
    .item:hover { background: #2a2a2a; }
    .item.playing { background: #2d4a3e; }
    .thumbnail {
      width: 64px;
      height: 36px;
      background: #333;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #888;
      overflow: hidden;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .info { flex: 1; min-width: 0; }
    .title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #eee;
    }
    .meta {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .item:hover .actions { opacity: 1; }
    button {
      border: none;
      background: #444;
      color: #ccc;
      padding: 3px 7px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    button:hover { background: #555; color: #fff; }
    button.danger:hover { background: #c0392b; }
    .bookmark-item { padding: 8px; }
    .bookmark-time {
      font-size: 12px;
      color: #4fc3f7;
      font-weight: 500;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="playlist-section">
    <h2>
      Playlist
      <button id="addBookmarkBtn" style="font-size:11px;">+ Bookmark</button>
    </h2>
    <div id="playlist-list"></div>
  </div>
  <div id="bookmarks-section">
    <h2>Bookmarks</h2>
    <div id="bookmarks-list"></div>
  </div>
  <script>
    const { postMessage, onMessage } = iina;

    function renderPlaylist(items, currentFilename) {
      const container = document.getElementById("playlist-list");
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="empty">No playlist items</div>';
        return;
      }
      container.innerHTML = items.map((item, i) => {
        const isPlaying = item.filename === currentFilename;
        const title = item.title || item.filename.split("/").pop();
        return `<div class="item ${isPlaying ? "playing" : ""}" data-index="${i}">
          <div class="thumbnail"><span>▶</span></div>
          <div class="info">
            <div class="title">${escapeHtml(title)}</div>
            <div class="meta">${isPlaying ? "Playing" : "Item " + (i + 1)}</div>
          </div>
          <div class="actions">
            <button data-action="play" data-index="${i}">Play</button>
          </div>
        </div>`;
      }).join("");
      container.querySelectorAll(".item").forEach(el => {
        el.addEventListener("click", (e) => {
          if (e.target.tagName === "BUTTON") return;
          const idx = parseInt(el.dataset.index);
          postMessage("playItem", { index: idx });
        });
      });
      container.querySelectorAll("button[data-action='play']").forEach(btn => {
        btn.addEventListener("click", () => {
          postMessage("playItem", { index: parseInt(btn.dataset.index) });
        });
      });
    }

    function renderBookmarks(bookmarks) {
      const container = document.getElementById("bookmarks-list");
      if (!bookmarks || bookmarks.length === 0) {
        container.innerHTML = '<div class="empty">No bookmarks yet</div>';
        return;
      }
      container.innerHTML = bookmarks.map((b, i) => {
        const time = formatTime(b.time);
        const title = b.title || b.filename.split("/").pop();
        return `<div class="item bookmark-item" data-index="${i}">
          <div class="info">
            <div class="title">${escapeHtml(title)}</div>
            <div class="bookmark-time" data-action="seek">${time}</div>
          </div>
          <div class="actions">
            <button data-action="open">Open</button>
            <button data-action="seek">Seek</button>
            <button class="danger" data-action="delete">Delete</button>
          </div>
        </div>`;
      }).join("");
      container.querySelectorAll(".item").forEach(el => {
        const idx = parseInt(el.dataset.index);
        el.addEventListener("click", (e) => {
          if (e.target.tagName === "BUTTON") return;
          const b = bookmarks[idx];
          if (b) postMessage("seekToTime", { time: b.time });
        });
      });
      container.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const idx = parseInt(btn.closest(".item").dataset.index);
          const action = btn.dataset.action;
          const b = bookmarks[idx];
          if (!b) return;
          if (action === "seek") {
            postMessage("seekToTime", { time: b.time });
          } else if (action === "open") {
            postMessage("openBookmark", { filename: b.filename, time: b.time });
          } else if (action === "delete") {
            postMessage("deleteBookmark", { filename: b.filename, time: b.time });
          }
        });
      });
    }

    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      return `${m}:${s.toString().padStart(2, "0")}`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    onMessage("init", (data) => {
      if (data.playlistEnabled !== false) renderPlaylist(data.playlist || [], data.currentItem?.filename);
      if (data.bookmarksEnabled !== false) renderBookmarks(data.bookmarks || []);
    });

    onMessage("bookmarksUpdated", (data) => {
      renderBookmarks(data.bookmarks || []);
    });

    document.getElementById("addBookmarkBtn").addEventListener("click", () => {
      postMessage("addBookmark", {});
    });
  </script>
</body>
</html>
